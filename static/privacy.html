<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title id="page-title">Privacy Policy · TubeRank</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0b;color:#f0f0f2;font-family:'DM Sans',sans-serif;line-height:1.7}
  .wrap{max-width:720px;margin:0 auto;padding:3rem 2rem}

  .back{color:#8a8a94;text-decoration:none;font-size:0.85rem}

  .lang-switch{display:flex;gap:2px;background:#18181c;border:1px solid #2a2a30;border-radius:8px;padding:2px}
  .lang-btn{background:none;border:none;border-radius:6px;padding:0.18rem 0.4rem;font-size:0.7rem;font-weight:600;color:#8a8a94;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;letter-spacing:0.04em}

  h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;margin-bottom:0.5rem}
  .date{color:#8a8a94;font-size:0.85rem;margin-bottom:2.5rem}
  h2{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;margin:2rem 0 0.75rem;color:#e8ff5a}
  p{color:#b0b0bc;margin-bottom:1rem;font-size:0.95rem}
  ul{color:#b0b0bc;padding-left:1.5rem;margin-bottom:1rem;font-size:0.95rem}
  ul li{margin-bottom:0.4rem}
  a{color:#e8ff5a;text-decoration:none}
  a:hover{text-decoration:underline}
  .divider{height:1px;background:#2a2a30;margin:2rem 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <a href="/" class="back" id="txt-back">← Back to TubeRank</a>
    <div class="lang-switch">
      <button class="lang-btn" id="lang-en" onclick="applyLang('en')">EN</button>
      <button class="lang-btn" id="lang-es" onclick="applyLang('es')">ES</button>

</div>

        <li>Для генерации AI-контента через API Claude от Anthropic</li>
        <li>Для получения публичных метаданных видео через YouTube Data API v3</li>

      <p>Мы не продаём и не сдаём в аренду ваши персональные данные. Данные передаются только:</p>

        <li><strong>Stripe</strong> — обработка платежей (<a href="https://stripe.com/privacy" target="_blank">Политика конфиденциальности Stripe</a>)</li>

      <p>Email-адреса, связанные с активными подписками, хранятся на протяжении действия подписки и в соответствии с требованиями бухгалтерского законодательства. Данные IP сбрасываются ежедневно и не хранятся постоянно. Темы запросов не сохраняются после обработки.</p>

function applyLang(lang) {
  localStorage.setItem('tr_lang', lang);
  const s = T[lang] || T.en;
  document.getElementById('page-title').textContent = s.pageTitle;
  document.getElementById('txt-back').textContent = s.back;
  document.getElementById('txt-h1').textContent = s.h1;
  document.getElementById('txt-date').textContent = s.date;
  document.getElementById('txt-copy').textContent = s.copy;
  document.getElementById('txt-terms-link').textContent = s.termsLink;
  document.getElementById('privacy-body').innerHTML = s.body;
  ['en','es','ru'].forEach(l => document.getElementById('lang-'+l).classList.toggle('active', l === lang));
}

applyLang(localStorage.getItem('tr_lang') || 'en');
</script>
</body>
</html>
